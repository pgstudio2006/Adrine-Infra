# Twenty CRM — Coolify / Traefik (no host port bind)
# Deploy via Coolify: New → Docker Compose → paste this file or point at repo path deploy/twenty/docker-compose.coolify.yml
# Domain: https://crm.adrine.in → service twenty-server:3000

services:
  twenty-db:
    image: postgres:16
    environment:
      POSTGRES_DB: default
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD}
      POSTGRES_USER: ${PG_DATABASE_USER:-postgres}
    volumes:
      - twenty_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d default']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  twenty-redis:
    image: redis:7-alpine
    command: ['--maxmemory-policy', 'noeviction']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  twenty-server:
    image: twentycrm/twenty:${TAG:-latest}
    expose:
      - '3000'
    environment:
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD}@twenty-db:5432/default
      REDIS_URL: redis://twenty-redis:6379
      SERVER_URL: ${SERVER_URL}
      APP_SECRET: ${APP_SECRET}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
    restart: unless-stopped

  twenty-worker:
    image: twentycrm/twenty:${TAG:-latest}
    command: ['yarn', 'worker:prod']
    environment:
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD}@twenty-db:5432/default
      REDIS_URL: redis://twenty-redis:6379
      SERVER_URL: ${SERVER_URL}
      APP_SECRET: ${APP_SECRET}
      DISABLE_DB_MIGRATIONS: 'true'
      DISABLE_CRON_JOBS_REGISTRATION: 'true'
    depends_on:
      twenty-server:
        condition: service_started
    restart: unless-stopped

volumes:
  twenty_pg: {}
