# Twenty CRM — docker compose (upstream image)
# Docs: https://twentyhq-twenty.mintlify.app/developers/self-hosting/docker-compose

services:
  twenty-db:
    image: postgres:16
    environment:
      POSTGRES_DB: default
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD:-postgres}
      POSTGRES_USER: ${PG_DATABASE_USER:-postgres}
    volumes:
      - twenty_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d default']
      interval: 5s
      timeout: 5s
      retries: 10

  twenty-redis:
    image: redis:7-alpine
    command: ['--maxmemory-policy', 'noeviction']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  twenty-server:
    image: twentycrm/twenty:${TAG:-latest}
    ports:
      - '${TWENTY_PORT:-3000}:3000'
    environment:
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD:-postgres}@twenty-db:5432/default
      REDIS_URL: redis://twenty-redis:6379
      SERVER_URL: ${SERVER_URL:-http://localhost:3000}
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
    restart: unless-stopped

  twenty-worker:
    image: twentycrm/twenty:${TAG:-latest}
    command: ['yarn', 'worker:prod']
    environment:
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD:-postgres}@twenty-db:5432/default
      REDIS_URL: redis://twenty-redis:6379
      SERVER_URL: ${SERVER_URL:-http://localhost:3000}
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      DISABLE_DB_MIGRATIONS: 'true'
      DISABLE_CRON_JOBS_REGISTRATION: 'true'
    depends_on:
      twenty-server:
        condition: service_started
    restart: unless-stopped

volumes:
  twenty_pg: {}
